<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="js/marked.min.js"></script>
    <script src="js/highlight.min.js"></script>
</head>
<body>

<!-- ========== Header ========== -->
<header class="header">
    <div class="header-left">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
                <path d="M8 14C8 10.686 10.686 8 14 8C17.314 8 20 10.686 20 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <path d="M11 18C11 16.343 12.343 15 14 15C15.657 15 17 16.343 17 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <circle cx="14" cy="20" r="1.5" fill="white"/>
                <defs>
                    <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                        <stop offset="0%" stop-color="#4f8cff"/>
                        <stop offset="100%" stop-color="#6c5ce7"/>
                    </linearGradient>
                </defs>F
            </svg>
            <span class="logo-text">AI 智能助手</span>
        </div>
    </div>
    <div class="header-right">
        <div class="user-id-group">
            <label for="userIdInput" class="user-id-label">用户ID</label>
            <input type="text" id="userIdInput" class="user-id-input" placeholder="请输入用户ID" autocomplete="off">
            <button id="randomUserIdBtn" class="btn btn-icon" title="随机生成用户ID">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<!-- ========== Toolbar ========== -->
<div class="toolbar">
    <div class="agent-select-group">
        <label for="agentSelect" class="toolbar-label">选择智能体</label>
        <select id="agentSelect" class="agent-select">
            <option value="">-- 请选择智能体 --</option>
        </select>
        <button id="refreshAgentBtn" class="btn btn-icon" title="刷新智能体列表">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
        </button>
        <span id="agentDesc" class="agent-desc"></span>
    </div>
    <div class="toolbar-actions">
        <div class="stream-toggle-group">
            <span class="stream-toggle-label">流式输出</span>
            <label class="toggle-switch">
                <input type="checkbox" id="streamToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <button id="newSessionBtn" class="btn btn-primary" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新建会话
        </button>
        <button id="clearChatBtn" class="btn btn-ghost" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
            </svg>
            清空对话
        </button>
    </div>
</div>

<!-- ========== Main Layout ========== -->
<div class="main-layout">

    <!-- ========== Sidebar ========== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">会话列表</span>
        </div>
        <div class="sidebar-content" id="sessionList">
            <!-- 会话列表动态生成 -->
        </div>
    </aside>

    <!-- ========== Chat Area ========== -->
    <main class="chat-area" id="chatArea">
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎提示（无会话时） -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                        <rect width="64" height="64" rx="16" fill="url(#welcomeGrad)"/>
                        <path d="M20 32C20 25.373 25.373 20 32 20C38.627 20 44 25.373 44 32" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        <path d="M26 42C26 37.582 29.582 34 34 34C38.418 34 42 37.582 42 42" stroke="white" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="34" cy="46" r="3" fill="white"/>
                        <defs>
                            <linearGradient id="welcomeGrad" x1="0" y1="0" x2="64" y2="64">
                                <stop offset="0%" stop-color="#4f8cff"/>
                                <stop offset="100%" stop-color="#6c5ce7"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h2 class="welcome-title">欢迎使用 AI 智能助手</h2>
                <p class="welcome-desc">请先输入用户ID，选择智能体，即可开始对话</p>
                <div class="welcome-hints" id="welcomeHints">
                    <!-- 智能体卡片将在此动态生成 -->
                </div>
            </div>
        </div>

        <!-- ========== Input Area ========== -->
        <div class="input-area" id="inputArea">
            <div class="input-container">
                <textarea id="messageInput" class="message-input" placeholder="输入您的问题，按 Enter 发送，Shift+Enter 换行..." rows="1" disabled></textarea>
                <button id="sendBtn" class="btn btn-send" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="input-tip">Enter 发送 · Shift+Enter 换行</p>
        </div>
    </main>
</div>

<!-- ========== Expired Session Modal ========== -->
<div class="modal-overlay" id="expiredModal">
    <div class="modal">
        <div class="modal-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e17055" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h3 class="modal-title">会话已过期</h3>
        <p class="modal-desc">您的会话已过期，继续使用将无法关联历史上下文</p>
        <div class="modal-actions">
            <button id="modalNewSessionBtn" class="btn btn-primary">新建会话</button>
            <button id="modalContinueBtn" class="btn btn-ghost">继续当前会话</button>
        </div>
    </div>
</div>

<!-- ========== Expired Session Modal ========== -->
<div class="modal-overlay" id="expiredModal">
    <div class="modal">
        <div class="modal-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e17055" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h3 class="modal-title">会话已过期</h3>
        <p class="modal-desc">您的会话已过期，继续使用将无法关联历史上下文</p>
        <div class="modal-actions">
            <button id="modalNewSessionBtn" class="btn btn-primary">新建会话</button>
            <button id="modalContinueBtn" class="btn btn-ghost">继续当前会话</button>
        </div>
    </div>
</div>

<!-- ========== Loading Indicator ========== -->
<div class="loading-toast" id="loadingToast">
    <div class="loading-spinner"></div>
    <span>AI 思考中...</span>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
