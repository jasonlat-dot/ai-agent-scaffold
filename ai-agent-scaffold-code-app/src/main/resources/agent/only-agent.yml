ai:
  agent:
    config:
      tables:
        # 配置 agent, map 结构可配置多个
        testAgent2:
          app-name: testAgent2
          agentDefinition:
            agent-id: testAgent2
            agent-name: testAgent2
            agent-desc: 一个测试的智能体
          module:
            # 不能为空
            ai-api:
              base-url: https://open.bigmodel.cn/api/paas/
              api-key: 242234771dd941379f67a52f8ac5a63a.64S1Yv17xk9KtsJG
              completions-path: v4/chat/completions
              embeddings-path: v4/embeddings
            # 不能为空
            chat-model:
              model: glm-4.7-flash
              # tool-mcp-list 可选参数
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/
                    sse-endpoint: v2/ai_search/mcp/sse?api_key=bce-v3/ALTAK-wrj8IPc6KH5Z1dsynXxEW/4a9da7380443ecfe9b168c8bea5f8eb1969534d4
                    request-timeout: 30000
                - local:
                    bean-name: myToolCallbackProvider
            # 不能为空
            llm-agents:
              - name: CarbonCaptureResearcher
                description: 小傅哥学习项目计划
                instruction: |
                  通过百度检索小傅哥编程实战项目，并根据检索内容，针对初学用户给出学习计划。
                chat-model:
                  model: glm-4v-flash
            runner:
              agent-name: CarbonCaptureResearcher
              plugin-name-list:
                - myTestPlugin
                - myLogPlugin